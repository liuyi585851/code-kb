name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (api + storage extras, no credentials)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[api,storage]
      - name: Run unittest suite
        run: |
          PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_*.py'

  quality-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run answer-quality gate (exit code is the gate)
        run: |
          # min-faithfulness 是按内置的合成演示语料调过的
          # (7 个问题,确定性的词法判分)。库对真实语料的默认值是 0.7
          # —— 把 Code-KB 接到自己的数据上时再调高。
          PYTHONPATH=src python3 -m codekb.cli quality-check --skip-missing-expected --min-faithfulness 0.55
