    dense_top_k: 30
    sparse_top_k: 30
    rrf_top_k: 20
    rerank_top_k: 4
  context_budget:
    max_atoms: 4
    max_atom_tokens: 800
    contextual_prefix_tokens: 200
  answer_policy:
    citation_required: true
    refuse_without_citation: true
